<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Use tLoc application to recognize your current location and places of interests to find nearby like dinner places, bars, car dealerships etc.">
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="css/tloc.css">
    <title>tLoc - find places of interests nearby</title>
  </head>
  <body class="container-fluid">
    <div class="row">
      <div class="col-md-6">
        <div data-share="true" data-width="450" data-show-faces="true" class="fb-like"></div>
      </div>
      <div class="col-md-6 text-right">
        <div id="location"></div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-12">
        <fb:login-button scope="publicprofile,email"></fb:login-button>
      </div>
    </div>
    <div id="routing"></div>
    <div class="row panel-footer">
      <div class="col-md-12">
        <div data-href="http://semitaho.github.io/tloc/" data-width="100%" data-numposts="10" class="fb-comments"></div>
      </div>
    </div>
    <script src="https://maps.googleapis.com/maps/api/js?signed_in=false&amp;libraries=places,geometry&amp;API_KEY=AIzaSyAXCoUJBbAzoHW_CgYd2HacWZ51icZdLeA"></script>
    <script src="http://google-maps-utility-library-v3.googlecode.com/svn/tags/markerwithlabel/1.1.9/markerwithlabel/src/markerwithlabel_packed.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
