<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="css/tloc.css">
    <title>tloc</title>
  </head>
  <body class="container-fluid">
    <div class="row">
      <div class="col-md-6">
        <div data-share="true" data-width="450" data-show-faces="true" class="fb-like"></div>
      </div>
      <div class="col-md-6 text-right">
        <div id="location"></div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-12">
        <div id="facebookLogin"></div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-6 col-md-offset-3">
        <div id="weather"></div>
      </div>
    </div>
    <div id="routing"></div>
    <div class="row">
      <div class="col-md-12">
        <div id="mapsinterests"></div>
      </div>
    </div>
    <div class="row panel-footer">
      <div class="col-md-12">
        <div data-href="http://semitaho.github.io/tloc/" data-width="100%" data-numposts="10" class="fb-comments"></div>
      </div>
    </div>
    <script>
      window.fbAsyncInit = function() {
        FB.init({
          appId      : '928749127211404',
          xfbml      : true,
          version    : 'v2.4'});
        FB.getLoginStatus(function (response) {
          console.log('response', response);
          if (response.status === 'connected') {
            console.log('Logged in.');
          }
          else {
            console.log('response', response);
            FB.api('/me', function(response) {
              console.log('Successful login for: ' + response.name);
            });
            console.log('not logged in')
            FB.login();
          }
        });
        };
      
      (function(d, s, id){
        var js, fjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) {return;}
        js = d.createElement(s); js.id = id;
        js.src = "//connect.facebook.net/en_US/sdk.js";
        fjs.parentNode.insertBefore(js, fjs);
      }(document, 'script', 'facebook-jssdk'));
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?signed_in=false&amp;libraries=places,geometry&amp;API_KEY=AIzaSyAXCoUJBbAzoHW_CgYd2HacWZ51icZdLeA"></script>
    <script src="http://google-maps-utility-library-v3.googlecode.com/svn/tags/markerwithlabel/1.1.9/markerwithlabel/src/markerwithlabel_packed.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
